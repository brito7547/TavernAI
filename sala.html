<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>TavernAI — Sessão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --stone:   #1a1714; --stone2:  #221e1a; --stone3:  #2a2420;
      --wood:    #2d1f0e; --parch:   #c4a882; --parch2:  #e8d5b0;
      --ember:   #e8621a; --gold:    #d4a843; --gold2:   #f0c85a;
      --ash:     #6b6055; --smoke:   #3a3028;
      --mestre:  #d4a843; --jogador: #7ec8a4; --sistema: #8896b0; --dado: #c084fc;
    }
    html { height: 100%; }
    body { height: 100%; background: var(--stone); color: var(--parch); font-family: 'Crimson Text', Georgia, serif; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Topbar ── */
    .topbar { flex-shrink:0; height:52px; background:var(--stone2); border-bottom:1px solid var(--smoke); display:flex; align-items:center; padding:0 0.8rem; gap:0.7rem; }
    .topbar-brand { font-family:'Cinzel',serif; font-weight:900; font-size:1rem; background:linear-gradient(135deg,var(--gold),var(--ember)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .topbar-sala { font-family:'Cinzel',serif; font-size:0.7rem; color:var(--ash); letter-spacing:0.1em; }
    .topbar-codigo { background:var(--smoke); border-radius:3px; padding:0.2rem 0.5rem; font-size:0.8rem; color:var(--gold); letter-spacing:0.15em; cursor:pointer; transition:background 0.15s; }
    .topbar-codigo:hover { background:var(--wood); }
    .topbar-spacer { flex:1; }
    #online-count { font-size:0.72rem; color:var(--ash); white-space:nowrap; }
    .dot-online { display:inline-block; width:7px; height:7px; background:#6dbf7a; border-radius:50%; margin-right:3px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .btn-topbar { background:none; border:1px solid var(--smoke); border-radius:3px; color:var(--ash); padding:0.3rem 0.6rem; font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.08em; cursor:pointer; transition:border-color 0.15s,color 0.15s; }
    .btn-topbar:hover { border-color:var(--gold); color:var(--gold); }
    #btn-arquivos-mobile { display:none; }
    @media (max-width:640px) { #btn-arquivos-mobile { display:block; } }

    /* ── Layout ── */
    .main-area { flex:1; display:flex; overflow:hidden; min-height:0; }
    .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }

    /* ── Mensagens ── */
    .messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.9rem; scroll-behavior:smooth; overscroll-behavior:contain; }
    .messages::-webkit-scrollbar { width:4px; }
    .messages::-webkit-scrollbar-thumb { background:var(--smoke); border-radius:3px; }
    .msg-item { max-width:88%; line-height:1.6; }
    .msg-item.mestre  { align-self:flex-start; }
    .msg-item.jogador { align-self:flex-end; }
    .msg-item.sistema { align-self:center; max-width:100%; }
    .msg-item.dado    { align-self:center; max-width:320px; }
    .msg-meta { font-size:0.72rem; letter-spacing:0.06em; margin-bottom:0.3rem; }
    .msg-item.mestre  .msg-meta { color:var(--mestre); }
    .msg-item.jogador .msg-meta { color:var(--jogador); }
    .msg-item.sistema .msg-meta { color:var(--sistema); text-align:center; }
    .msg-item.dado    .msg-meta { color:var(--dado); text-align:center; }
    .msg-bubble { padding:0.75rem 0.9rem; border-radius:3px; font-size:1rem; white-space:pre-wrap; word-break:break-word; }
    .msg-item.mestre  .msg-bubble { background:var(--stone2); border-left:3px solid var(--gold); }
    .msg-item.jogador .msg-bubble { background:var(--stone3); border-left:3px solid var(--jogador); }
    .msg-item.sistema .msg-bubble { background:transparent; border:1px dashed var(--smoke); color:var(--ash); font-style:italic; font-size:0.85rem; text-align:center; }
    .msg-item.dado    .msg-bubble { background:var(--stone2); border:1px solid var(--dado); text-align:center; padding:1rem; }

    /* ── Dado animado ── */
    .dice-wrap { display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
    .dice-face {
      width:64px; height:64px; background:linear-gradient(135deg,#2a1f3d,#1a1428);
      border:2px solid var(--dado); border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:1.6rem; color:var(--dado);
      font-weight:900; position:relative; overflow:hidden;
      box-shadow:0 0 20px rgba(192,132,252,0.3);
    }
    .dice-face.rolling { animation:diceRoll 0.8s ease-out; }
    @keyframes diceRoll {
      0%   { transform:rotate(0deg)   scale(1);    opacity:0.4; }
      25%  { transform:rotate(180deg) scale(1.15); opacity:0.8; }
      60%  { transform:rotate(320deg) scale(0.95); opacity:1;   }
      80%  { transform:rotate(355deg) scale(1.05); }
      100% { transform:rotate(360deg) scale(1);    }
    }
    .dice-label { font-family:'Cinzel',serif; font-size:0.7rem; color:var(--dado); letter-spacing:0.12em; opacity:0.7; }
    .dice-result-text { font-size:0.9rem; color:var(--parch); }

    /* Typing */
    .typing-indicator .msg-bubble { display:flex; gap:5px; align-items:center; }
    .typing-dot { width:7px; height:7px; background:var(--gold); border-radius:50%; animation:bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    /* ── Input ── */
    .input-area { flex-shrink:0; border-top:1px solid var(--smoke); background:var(--stone2); padding:0.6rem 0.8rem; display:flex; flex-direction:column; gap:0.4rem; }
    .dice-hint { font-size:0.72rem; color:var(--ash); padding:0 0.2rem; }
    .dice-hint span { color:var(--dado); cursor:pointer; margin-right:0.5rem; }
    .dice-hint span:hover { color:var(--gold); }
    .input-row { display:flex; gap:0.5rem; align-items:flex-end; }
    .input-area textarea { flex:1; background:var(--wood); border:1px solid var(--smoke); border-radius:3px; padding:0.65rem 0.8rem; color:var(--parch2); font-family:'Crimson Text',serif; font-size:1rem; resize:none; outline:none; max-height:100px; min-height:42px; line-height:1.4; transition:border-color 0.2s; -webkit-appearance:none; }
    .input-area textarea:focus { border-color:var(--gold); }
    .input-area textarea::placeholder { color:var(--ash); opacity:0.6; }
    .btn-send { flex-shrink:0; background:linear-gradient(135deg,var(--ember),#c0450e); border:none; border-radius:3px; color:var(--parch2); font-family:'Cinzel',serif; font-size:0.8rem; font-weight:600; letter-spacing:0.08em; padding:0.65rem 0.9rem; cursor:pointer; transition:filter 0.15s; white-space:nowrap; }
    .btn-send:hover { filter:brightness(1.15); }
    .btn-send:disabled { opacity:0.5; cursor:not-allowed; filter:none; }

    /* ── Sidebar ── */
    .sidebar { width:250px; flex-shrink:0; background:var(--stone2); border-left:1px solid var(--smoke); display:flex; flex-direction:column; overflow-y:auto; }
    @media (max-width:640px) { .sidebar { display:none; } }
    .sidebar-section { border-bottom:1px solid var(--smoke); }
    .sidebar-title { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ash); padding:0.7rem 1rem 0.4rem; }
    .sidebar-body { padding:0 1rem 1rem; }
    .player-list { list-style:none; }
    .player-item { font-size:0.88rem; padding:0.22rem 0; color:var(--parch); display:flex; align-items:center; gap:0.4rem; }
    .player-item span.dot { width:6px; height:6px; background:#6dbf7a; border-radius:50%; flex-shrink:0; }
    #upload-area { display:none; }
    .upload-btn { display:block; width:100%; padding:0.5rem; background:transparent; border:1px dashed var(--smoke); border-radius:3px; color:var(--ash); font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.08em; cursor:pointer; text-align:center; margin-bottom:0.45rem; transition:border-color 0.15s,color 0.15s; }
    .upload-btn:hover { border-color:var(--gold); color:var(--gold); }
    .file-input { display:none; }
    .file-tag { display:inline-flex; align-items:center; gap:0.3rem; background:var(--smoke); border-radius:2px; padding:0.2rem 0.5rem; font-size:0.72rem; color:var(--parch); margin:0.2rem 0.1rem; }
    .file-tag button { background:none; border:none; color:var(--ash); cursor:pointer; font-size:0.8rem; padding:0; }
    .file-tag button:hover { color:#e05555; }
    #grimorio-status { font-size:0.8rem; color:var(--ash); font-style:italic; margin-bottom:0.5rem; }
    .status-ok { color:#6dbf7a !important; font-style:normal !important; }
    .btn-iniciar { width:100%; padding:0.6rem; background:linear-gradient(135deg,var(--gold),#b8892a); border:none; border-radius:3px; color:var(--stone); font-family:'Cinzel',serif; font-size:0.75rem; font-weight:700; letter-spacing:0.1em; cursor:pointer; transition:filter 0.15s; margin-top:0.4rem; display:none; }
    .btn-iniciar:hover { filter:brightness(1.1); }

    /* ── Drawer mobile ── */
    .drawer-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50; }
    .drawer-bg.open { display:block; }
    .drawer { position:fixed; bottom:0; left:0; right:0; background:var(--stone2); border-top:1px solid var(--smoke); border-radius:12px 12px 0 0; padding:1.2rem 1rem 2rem; z-index:51; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s ease; }
    .drawer-bg.open .drawer { transform:translateY(0); }
    .drawer-handle { width:40px; height:4px; background:var(--smoke); border-radius:2px; margin:0 auto 1.2rem; }
    .drawer-title { font-family:'Cinzel',serif; font-size:0.85rem; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem; }
    #drawer-upload { display:none; }
    #grimorio-status-d { font-size:0.8rem; color:var(--ash); font-style:italic; margin-bottom:0.5rem; }
    #arquivos-tags-d .file-tag { display:inline-flex; }

    /* ── Modal ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal-bg.hidden { display:none; }
    .modal { background:var(--stone2); border:1px solid var(--smoke); border-radius:4px; padding:1.8rem; max-width:400px; width:100%; position:relative; }
    .modal::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .modal h2 { font-family:'Cinzel',serif; font-size:1rem; color:var(--gold); margin-bottom:1.2rem; }
    .modal label { display:block; font-size:0.78rem; color:var(--ash); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:0.3rem; }
    .modal input { width:100%; background:var(--wood); border:1px solid var(--smoke); border-radius:3px; padding:0.6rem 0.8rem; color:var(--parch2); font-family:'Crimson Text',serif; font-size:1rem; outline:none; margin-bottom:1rem; transition:border-color 0.2s; }
    .modal input:focus { border-color:var(--gold); }
    .modal-btns { display:flex; gap:0.6rem; }
    .btn-modal-ok { flex:1; padding:0.65rem; background:linear-gradient(135deg,var(--ember),#c0450e); border:none; border-radius:3px; color:var(--parch2); font-family:'Cinzel',serif; font-size:0.8rem; font-weight:600; letter-spacing:0.08em; cursor:pointer; }
    .btn-modal-cancel { flex:1; padding:0.65rem; background:transparent; border:1px solid var(--smoke); border-radius:3px; color:var(--ash); font-family:'Cinzel',serif; font-size:0.8rem; cursor:pointer; }
  </style>
</head>
<body>

<!-- Modal identificação -->
<div class="modal-bg" id="modal-ident">
  <div class="modal">
    <h2>🗝️ Identificação</h2>
    <label>Seu nome / Personagem</label>
    <input type="text" id="modal-nome" placeholder="Ex: Kael, o Errante" maxlength="40" />
    <label>Código da sala</label>
    <input type="text" id="modal-codigo" placeholder="Ex: KXMR7" maxlength="8" style="text-transform:uppercase" />
    <label>Senha da sala</label>
    <input type="password" id="modal-senha" placeholder="Senha fornecida pelo Mestre" maxlength="30" />
    <div class="modal-btns">
      <button class="btn-modal-ok" onclick="confirmarIdent()">Entrar</button>
      <button class="btn-modal-cancel" onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <p id="modal-err" style="color:#e05555;font-size:0.85rem;margin-top:0.6rem;text-align:center;min-height:1.2em;"></p>
  </div>
</div>

<!-- Drawer mobile -->
<div class="drawer-bg" id="drawer-bg" onclick="fecharDrawer(event)">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">📜 Arquivos da Sessão</div>
    <div id="drawer-upload">
      <p id="grimorio-status-d">Nenhum arquivo carregado</p>
      <label class="upload-btn" for="file-grimorio-d">+ Grimório do Mestre</label>
      <input class="file-input" type="file" id="file-grimorio-d" accept=".html,.pdf,.txt" onchange="carregarArquivo('grimorio',this)" />
      <label class="upload-btn" for="file-fichas-d">+ Fichas dos Personagens</label>
      <input class="file-input" type="file" id="file-fichas-d" accept=".html,.pdf,.txt" multiple onchange="carregarArquivo('fichas',this)" />
      <label class="upload-btn" for="file-regras-d">+ Regras do Sistema</label>
      <input class="file-input" type="file" id="file-regras-d" accept=".html,.pdf,.txt" onchange="carregarArquivo('regras',this)" />
      <div id="arquivos-tags-d"></div>
      <button class="btn-iniciar" id="btn-iniciar-d" onclick="iniciarSessao()">🎲 Iniciar Sessão</button>
    </div>
    <div id="drawer-jogadores">
      <p style="font-size:0.85rem;color:var(--ash);">Aguardando o Mestre iniciar a sessão…</p>
    </div>
  </div>
</div>

<!-- App -->
<header class="topbar">
  <span class="topbar-brand">TavernAI</span>
  <span class="topbar-sala">Sala:</span>
  <span class="topbar-codigo" id="topbar-codigo" onclick="copiarCodigo()" title="Toque para copiar">—</span>
  <span class="topbar-spacer"></span>
  <span id="online-count"><span class="dot-online"></span><span id="n-online">1</span></span>
  <button class="btn-topbar" id="btn-arquivos-mobile" onclick="abrirDrawer()">☰</button>
  <button class="btn-topbar" onclick="window.location.href='index.html'">Sair</button>
</header>

<div class="main-area">
  <main class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="dice-hint">
        Dados: <span onclick="inserirDado('d4')">/d4</span><span onclick="inserirDado('d6')">/d6</span><span onclick="inserirDado('d8')">/d8</span><span onclick="inserirDado('d10')">/d10</span><span onclick="inserirDado('d12')">/d12</span><span onclick="inserirDado('d20')">/d20</span>
      </div>
      <div class="input-row">
        <textarea id="input-msg" rows="1" placeholder="Fale como seu personagem… ou /d20 para rolar dado" onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="btn-send" onclick="enviarMensagem()">Enviar</button>
      </div>
    </div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Aventureiros</div>
      <div class="sidebar-body">
        <ul class="player-list" id="player-list"><li class="player-item"><span class="dot"></span> —</li></ul>
      </div>
    </div>
    <div class="sidebar-section" id="upload-area">
      <div class="sidebar-title">📜 Arquivos da Sessão</div>
      <div class="sidebar-body">
        <p id="grimorio-status">Nenhum arquivo carregado</p>
        <label class="upload-btn" for="file-grimorio">+ Grimório do Mestre</label>
        <input class="file-input" type="file" id="file-grimorio" accept=".html,.pdf,.txt" onchange="carregarArquivo('grimorio',this)" />
        <label class="upload-btn" for="file-fichas">+ Fichas dos Personagens</label>
        <input class="file-input" type="file" id="file-fichas" accept=".html,.pdf,.txt" multiple onchange="carregarArquivo('fichas',this)" />
        <label class="upload-btn" for="file-regras">+ Regras do Sistema</label>
        <input class="file-input" type="file" id="file-regras" accept=".html,.pdf,.txt" onchange="carregarArquivo('regras',this)" />
        <div id="arquivos-tags"></div>
        <button class="btn-iniciar" id="btn-iniciar" onclick="iniciarSessao()">🎲 Iniciar Sessão</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">📖 Resumo</div>
      <div class="sidebar-body">
        <p style="font-size:0.82rem;color:var(--ash);font-style:italic;" id="resumo-texto">A sessão ainda não começou…</p>
      </div>
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  const SUPA_URL  = 'https://jkkpevljkphhxmcqwwud.supabase.co';
  const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impra3Bldmxqa3BoaHhtY3F3d3VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjAwNzgsImV4cCI6MjA5NzkzNjA3OH0.j4rGWiTZxc3PhTX3k_xhlXya5imnubvy4Hye1IrGV4g';
  const EDGE_URL  = `${SUPA_URL}/functions/v1/mestre-ia`;
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let SESSION = null, SALA_ID = null, salaData = null;
  let arquivos = { grimorio:'', regras:'', fichas:[] };
  let sessaoIniciada = false, historicoIA = [];

  // ── Init ──
  window.addEventListener('DOMContentLoaded', async () => {
    const params   = new URLSearchParams(window.location.search);
    const codigoURL = params.get('sala')?.toUpperCase();
    const raw = localStorage.getItem('tavern_session');
    if (raw) {
      SESSION = JSON.parse(raw);
      if (codigoURL && SESSION.codigo !== codigoURL) { mostrarModal(codigoURL); return; }
      document.getElementById('modal-ident').classList.add('hidden');
      await carregarSala();
    } else if (codigoURL) {
      mostrarModal(codigoURL);
    } else {
      window.location.href = 'index.html';
    }
  });

  function mostrarModal(codigo) {
    document.getElementById('modal-ident').classList.remove('hidden');
    if (codigo) document.getElementById('modal-codigo').value = codigo;
  }

  async function confirmarIdent() {
    const nome   = document.getElementById('modal-nome').value.trim();
    const codigo = document.getElementById('modal-codigo').value.trim().toUpperCase();
    const senha  = document.getElementById('modal-senha').value.trim();
    const err    = document.getElementById('modal-err');
    if (!nome)  { err.textContent='Digite seu nome.'; return; }
    if (!codigo){ err.textContent='Digite o código da sala.'; return; }
    if (!senha) { err.textContent='Digite a senha.'; return; }
    err.textContent = 'Verificando…';
    const senhaHash = await hashSenha(senha);
    const { data, error } = await sb.from('salas').select('id,codigo,senha_hash').eq('codigo',codigo).single();
    if (error||!data) { err.textContent='Sala não encontrada.'; return; }
    if (data.senha_hash !== senhaHash) { err.textContent='Senha incorreta.'; return; }
    SESSION = { codigo, nome, papel:'jogador', senha_hash:senhaHash };
    localStorage.setItem('tavern_session', JSON.stringify(SESSION));
    document.getElementById('modal-ident').classList.add('hidden');
    await carregarSala();
  }

  async function hashSenha(s) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  // ── Carregar sala ──
  async function carregarSala() {
    const { data, error } = await sb.from('salas').select('*').eq('codigo',SESSION.codigo).single();
    if (error||!data) { adicionarMsg('sistema','TavernAI','Sala não encontrada.',null,false); return; }
    SALA_ID = data.id; salaData = data;
    document.getElementById('topbar-codigo').textContent = SESSION.codigo;
    const ehMestre = SESSION.papel === 'mestre';
    if (ehMestre) {
      document.getElementById('upload-area').style.display = 'block';
      document.getElementById('drawer-upload').style.display = 'block';
      document.getElementById('drawer-jogadores').style.display = 'none';
      if (data.grimorio_texto) { arquivos.grimorio=data.grimorio_texto; marcarArquivo('grimorio','Grimório'); }
      if (data.regras_texto)   { arquivos.regras=data.regras_texto; marcarArquivo('regras','Regras'); }
      try { JSON.parse(data.fichas_json||'[]').forEach((f,i)=>{ arquivos.fichas.push(f); marcarArquivo('fichas',`Ficha ${i+1}`); }); } catch(e){}
      verificarBotaoIniciar();
      if (data.sessao_iniciada) sessaoIniciada = true;
    }
    const { data:msgs } = await sb.from('mensagens').select('*').eq('sala_id',SALA_ID).order('criado_em',{ascending:true}).limit(100);
    if (msgs && msgs.length > 0) {
      msgs.forEach(m => {
        if (m.papel === 'dado') renderizarDado(m.autor, JSON.parse(m.conteudo), false);
        else adicionarMsg(m.papel, m.autor, m.conteudo, m.criado_em, false);
      });
      historicoIA = msgs.filter(m=>m.papel!=='sistema'&&m.papel!=='dado').map(m=>({
        role: m.papel==='mestre'?'assistant':'user',
        content:`[${m.autor}]: ${m.conteudo}`
      }));
      scrollBottom();
    } else {
      adicionarMsg('sistema','TavernAI', ehMestre
        ? `Bem-vindo, ${SESSION.nome}. Toque em ☰ para carregar os arquivos e iniciar a sessão.`
        : `Você entrou na taverna como ${SESSION.nome}. Aguarde o Mestre iniciar a sessão.`,
        null, false);
    }
    inscreverRealtime();
    atualizarJogadores();
  }

  // ── Realtime ──
  function inscreverRealtime() {
    sb.channel(`sala-${SALA_ID}`)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'mensagens',filter:`sala_id=eq.${SALA_ID}`}, payload => {
        const m = payload.new;
        // Evitar duplicar mensagens do próprio jogador
        if (m.autor === SESSION.nome && m.papel === 'jogador') return;
        if (m.autor === SESSION.nome && m.papel === 'dado') return;
        if (m.papel === 'dado') {
          try { renderizarDado(m.autor, JSON.parse(m.conteudo), true); } catch(e){}
        } else {
          adicionarMsg(m.papel, m.autor, m.conteudo, m.criado_em);
        }
        if (m.papel !== 'sistema' && m.papel !== 'dado') {
          historicoIA.push({ role:m.papel==='mestre'?'assistant':'user', content:`[${m.autor}]: ${m.conteudo}` });
        }
      }).subscribe();
  }

  // ── Upload ──
  async function carregarArquivo(tipo, input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    for (const file of files) {
      let texto = '';
      if (file.type === 'application/pdf') texto = await extrairPDF(file);
      else {
        texto = await file.text();
        if (file.name.endsWith('.html')) { const tmp=document.createElement('div'); tmp.innerHTML=texto; texto=tmp.innerText; }
      }
      if (tipo==='grimorio') { arquivos.grimorio=texto; marcarArquivo('grimorio',file.name); }
      else if (tipo==='regras') { arquivos.regras=texto; marcarArquivo('regras',file.name); }
      else { arquivos.fichas.push(texto); marcarArquivo('fichas',file.name); }
    }
    await sb.from('salas').update({ grimorio_texto:arquivos.grimorio, regras_texto:arquivos.regras, fichas_json:JSON.stringify(arquivos.fichas) }).eq('id',SALA_ID);
    verificarBotaoIniciar();
  }

  async function extrairPDF(file) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let txt = '';
    for (let i=1;i<=pdf.numPages;i++) { const pg=await pdf.getPage(i); const ct=await pg.getTextContent(); txt+=ct.items.map(x=>x.str).join(' ')+'\n'; }
    return txt;
  }

  function marcarArquivo(tipo, nome) {
    [['arquivos-tags','grimorio-status'],['arquivos-tags-d','grimorio-status-d']].forEach(([cId,sId])=>{
      const container = document.getElementById(cId); if (!container) return;
      const id = `tag-${tipo}-${cId}`;
      if (document.getElementById(id)) return;
      const icones={grimorio:'📖',regras:'⚔️',fichas:'🧙'};
      const tag = document.createElement('span'); tag.className='file-tag'; tag.id=id;
      tag.innerHTML=`${icones[tipo]||'📄'} ${nome.substring(0,18)} <button onclick="this.parentElement.remove()">×</button>`;
      container.appendChild(tag);
      const s=document.getElementById(sId); if(s){s.textContent='Arquivos carregados';s.className='status-ok';}
    });
  }

  function verificarBotaoIniciar() {
    ['btn-iniciar','btn-iniciar-d'].forEach(id=>{ const b=document.getElementById(id); if(b) b.style.display=arquivos.grimorio?'block':'none'; });
  }

  // ── Iniciar sessão ──
  async function iniciarSessao() {
    if (sessaoIniciada) return;
    sessaoIniciada = true;
    ['btn-iniciar','btn-iniciar-d'].forEach(id=>{ const b=document.getElementById(id); if(b){b.disabled=true;b.textContent='⏳ Convocando…';} });
    await sb.from('salas').update({sessao_iniciada:true}).eq('id',SALA_ID);
    fecharDrawer();
    const abertura = await chamarIA('[Sistema]: A sessão começa agora. Faça uma abertura narrativa épica apresentando o mundo e convidando os jogadores a agir. 3 parágrafos.');
    if (abertura) await salvarEExibir('mestre','🎲 Mestre', abertura);
    ['btn-iniciar','btn-iniciar-d'].forEach(id=>{ const b=document.getElementById(id); if(b) b.textContent='✅ Sessão em curso'; });
    document.getElementById('resumo-texto').textContent='Sessão iniciada. O Mestre aguarda os aventureiros.';
  }

  // ── Dados ──
  const DADOS_VALIDOS = [4,6,8,10,12,20,100];

  function inserirDado(tipo) {
    const input = document.getElementById('input-msg');
    input.value = `/${tipo}`;
    input.focus();
  }

  function parseDado(texto) {
    const match = texto.trim().match(/^\/d(\d+)$/i);
    if (!match) return null;
    const lados = parseInt(match[1]);
    return DADOS_VALIDOS.includes(lados) ? lados : null;
  }

  function rolarDado(lados) {
    return Math.floor(Math.random() * lados) + 1;
  }

  // Renderiza o dado no chat (usado localmente e via realtime)
  function renderizarDado(autor, dadoData, comAnimacao) {
    const { lados, resultado } = dadoData;
    const el = document.createElement('div');
    el.className = 'msg-item dado';
    const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    el.innerHTML = `
      <div class="msg-meta">🎲 ${esc(autor)} rolou um D${lados} · ${hora}</div>
      <div class="msg-bubble">
        <div class="dice-wrap">
          <div class="dice-face${comAnimacao?' rolling':''}" id="dice-face-${Date.now()}">${resultado}</div>
          <div class="dice-label">D${lados}</div>
          <div class="dice-result-text">${autor} tirou <strong>${resultado}</strong> de ${lados}</div>
        </div>
      </div>`;
    document.getElementById('messages').appendChild(el);
    scrollBottom();
  }

  // ── Enviar mensagem ──
  async function enviarMensagem() {
    const input = document.getElementById('input-msg');
    const texto = input.value.trim();
    if (!texto || !SALA_ID) return;

    const btnSend = document.getElementById('btn-send');
    btnSend.disabled = true;
    input.value = ''; autoResize(input);

    // Verificar se é rolagem de dado
    const lados = parseDado(texto);
    if (lados !== null) {
      await processarDado(lados);
      btnSend.disabled = false;
      return;
    }

    // Mensagem normal
    adicionarMsg('jogador', SESSION.nome, texto, new Date().toISOString());
    await sb.from('mensagens').insert({sala_id:SALA_ID, papel:'jogador', autor:SESSION.nome, conteudo:texto});
    historicoIA.push({role:'user', content:`[${SESSION.nome}]: ${texto}`});

    mostrarTyping();
    const resp = await chamarIA(`[${SESSION.nome}]: ${texto}`);
    removerTyping();

    if (resp) {
      await salvarEExibir('mestre','🎲 Mestre', resp);
      historicoIA.push({role:'assistant', content:resp});
    }

    btnSend.disabled = false;
    input.focus();
  }

  async function processarDado(lados) {
    const resultado = rolarDado(lados);
    const dadoData  = { lados, resultado };

    // Exibir localmente com animação
    renderizarDado(SESSION.nome, dadoData, true);

    // Salvar no Supabase (outros verão via realtime)
    await sb.from('mensagens').insert({
      sala_id: SALA_ID,
      papel: 'dado',
      autor: SESSION.nome,
      conteudo: JSON.stringify(dadoData)
    });

    // IA reage ao resultado
    const contexto = `[Sistema de Dados]: ${SESSION.nome} rolou um D${lados} e tirou ${resultado}. Reaja narrativamente a esse resultado no contexto da cena atual. Seja conciso (1-2 frases).`;
    mostrarTyping();
    const resp = await chamarIA(contexto);
    removerTyping();
    if (resp) {
      await salvarEExibir('mestre','🎲 Mestre', resp);
      historicoIA.push({role:'assistant', content:resp});
    }

    document.getElementById('btn-send').disabled = false;
    document.getElementById('input-msg').focus();
  }

  async function salvarEExibir(papel, autor, conteudo) {
    await sb.from('mensagens').insert({sala_id:SALA_ID, papel, autor, conteudo});
    adicionarMsg(papel, autor, conteudo, new Date().toISOString());
  }

  // ── Claude via Edge Function ──
  async function chamarIA(msgAtual) {
    if (!arquivos.grimorio && salaData?.grimorio_texto) {
      arquivos.grimorio = salaData.grimorio_texto;
      arquivos.regras   = salaData.regras_texto || '';
      try { arquivos.fichas = JSON.parse(salaData.fichas_json||'[]'); } catch(e){}
    }
    const system = construirPrompt();
    const msgs = [...historicoIA.slice(-30)];
    if (!msgs.length || msgs[msgs.length-1].content !== msgAtual) {
      msgs.push({role:'user', content:msgAtual});
    }
    try {
      const res = await fetch(EDGE_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ system, messages: msgs })
      });
      const data = await res.json();
      if (data.error) { console.error('Edge error:', data.error); return '*(O Mestre hesita… tente novamente.)*'; }
      return data.text || null;
    } catch(e) {
      console.error('Erro IA:', e);
      return '*(O Mestre hesita… tente novamente.)*';
    }
  }

  function construirPrompt() {
    let p = `Você é o Mestre de uma sessão de RPG de mesa. Mantenha-se SEMPRE fiel ao mundo, tom e regras do Grimório fornecido. Nunca saia do personagem. Responda em português (pt-BR).

COMPORTAMENTO:
- Narre cenários, NPCs e consequências das ações dos personagens.
- Mantenha suspense e coerência com o lore.
- Quando um jogador rolar dados, reaja narrativamente ao resultado.
- Respostas entre 1 a 4 parágrafos, linguagem imersiva e literária.
- Nunca invente informações que contradigam o Grimório.`;
    if (arquivos.grimorio) p+=`\n\n═══ GRIMÓRIO DO MESTRE ═══\n${arquivos.grimorio.substring(0,8000)}`;
    if (arquivos.regras)   p+=`\n\n═══ REGRAS DO SISTEMA ═══\n${arquivos.regras.substring(0,3000)}`;
    if (arquivos.fichas.length>0) {
      p+=`\n\n═══ FICHAS DOS PERSONAGENS ═══`;
      arquivos.fichas.forEach((f,i)=>{ p+=`\n--- Personagem ${i+1} ---\n${f.substring(0,2000)}`; });
    }
    return p;
  }

  // ── UI helpers ──
  function adicionarMsg(papel, autor, conteudo, ts, scroll=true) {
    const el = document.createElement('div'); el.className=`msg-item ${papel}`;
    const hora = ts ? new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    el.innerHTML=`<div class="msg-meta">${esc(autor)}${hora?' · '+hora:''}</div><div class="msg-bubble">${esc(conteudo)}</div>`;
    document.getElementById('messages').appendChild(el);
    if (scroll) scrollBottom();
  }
  function mostrarTyping() {
    const el=document.createElement('div'); el.className='msg-item mestre typing-indicator'; el.id='typing';
    el.innerHTML=`<div class="msg-meta">🎲 Mestre</div><div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
    document.getElementById('messages').appendChild(el); scrollBottom();
  }
  function removerTyping() { document.getElementById('typing')?.remove(); }
  function scrollBottom() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
  function onKeyDown(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviarMensagem();} }
  function copiarCodigo() {
    navigator.clipboard.writeText(SESSION?.codigo||'').then(()=>{
      const el=document.getElementById('topbar-codigo'); const orig=el.textContent;
      el.textContent='✓ Copiado'; setTimeout(()=>{el.textContent=orig;},1500);
    });
  }
  async function atualizarJogadores() {
    const {data} = await sb.from('mensagens').select('autor').eq('sala_id',SALA_ID).neq('papel','sistema').neq('papel','mestre').neq('papel','dado');
    const nomes=[...new Set([SESSION.nome,...(data||[]).map(m=>m.autor)])];
    document.getElementById('player-list').innerHTML=nomes.slice(0,8).map(n=>`<li class="player-item"><span class="dot"></span> ${esc(n)}</li>`).join('');
    document.getElementById('n-online').textContent=nomes.length;
  }
  function abrirDrawer() { document.getElementById('drawer-bg').classList.add('open'); }
  function fecharDrawer(e) { if(!e||e.target===document.getElementById('drawer-bg')) document.getElementById('drawer-bg').classList.remove('open'); }
</script>
</body>
</html>
