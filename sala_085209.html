<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TavernAI — Sessão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --stone:   #1a1714;
      --stone2:  #221e1a;
      --stone3:  #2a2420;
      --wood:    #2d1f0e;
      --parch:   #c4a882;
      --parch2:  #e8d5b0;
      --ember:   #e8621a;
      --gold:    #d4a843;
      --gold2:   #f0c85a;
      --ash:     #6b6055;
      --smoke:   #3a3028;
      --mestre:  #d4a843;
      --jogador: #7ec8a4;
      --sistema: #8896b0;
    }

    html, body { height: 100%; background: var(--stone); color: var(--parch); font-family: 'Crimson Text', Georgia, serif; overflow: hidden; }

    /* ── Layout principal ── */
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 1fr 260px;
      grid-template-areas:
        "topbar topbar"
        "chat   sidebar";
    }
    @media (max-width: 640px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-areas:
          "topbar"
          "chat";
      }
      .sidebar { display: none; }
    }

    /* ── Topbar ── */
    .topbar {
      grid-area: topbar;
      background: var(--stone2);
      border-bottom: 1px solid var(--smoke);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 1rem;
    }
    .topbar-brand {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--gold), var(--ember));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .topbar-sala {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--ash);
      letter-spacing: 0.1em;
    }
    .topbar-codigo {
      background: var(--smoke);
      border-radius: 3px;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .topbar-codigo:hover { background: var(--wood); }
    .topbar-spacer { flex: 1; }
    .btn-config {
      background: none;
      border: 1px solid var(--smoke);
      border-radius: 3px;
      color: var(--ash);
      padding: 0.3rem 0.7rem;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-config:hover { border-color: var(--gold); color: var(--gold); }
    #online-count {
      font-size: 0.75rem;
      color: var(--ash);
    }
    .dot-online {
      display: inline-block;
      width: 7px; height: 7px;
      background: #6dbf7a;
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Chat ── */
    .chat-area {
      grid-area: chat;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--smoke); border-radius: 3px; }

    .msg-item {
      max-width: 88%;
      line-height: 1.6;
    }
    .msg-item.mestre  { align-self: flex-start; }
    .msg-item.jogador { align-self: flex-end; }
    .msg-item.sistema { align-self: center; max-width: 100%; }

    .msg-meta {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }
    .msg-item.mestre  .msg-meta { color: var(--mestre); }
    .msg-item.jogador .msg-meta { color: var(--jogador); }
    .msg-item.sistema .msg-meta { color: var(--sistema); text-align: center; }

    .msg-bubble {
      padding: 0.8rem 1rem;
      border-radius: 3px;
      font-size: 1.05rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-item.mestre .msg-bubble {
      background: var(--stone2);
      border-left: 3px solid var(--gold);
    }
    .msg-item.jogador .msg-bubble {
      background: var(--stone3);
      border-left: 3px solid var(--jogador);
    }
    .msg-item.sistema .msg-bubble {
      background: transparent;
      border: 1px dashed var(--smoke);
      color: var(--ash);
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      padding: 0.5rem 1rem;
    }

    /* Digitando */
    .typing-indicator .msg-bubble {
      display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    /* ── Input ── */
    .input-area {
      border-top: 1px solid var(--smoke);
      background: var(--stone2);
      padding: 0.8rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      background: var(--wood);
      border: 1px solid var(--smoke);
      border-radius: 3px;
      padding: 0.7rem 0.9rem;
      color: var(--parch2);
      font-family: 'Crimson Text', serif;
      font-size: 1.05rem;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .input-area textarea:focus { border-color: var(--gold); }
    .input-area textarea::placeholder { color: var(--ash); opacity: 0.6; }
    .btn-send {
      background: linear-gradient(135deg, var(--ember), #c0450e);
      border: none;
      border-radius: 3px;
      color: var(--parch2);
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: filter 0.15s;
      white-space: nowrap;
    }
    .btn-send:hover { filter: brightness(1.15); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    /* ── Sidebar ── */
    .sidebar {
      grid-area: sidebar;
      background: var(--stone2);
      border-left: 1px solid var(--smoke);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      border-bottom: 1px solid var(--smoke);
    }
    .sidebar-title {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ash);
      padding: 0.7rem 1rem 0.5rem;
    }
    .sidebar-body {
      padding: 0 1rem 1rem;
    }

    /* Jogadores online */
    .player-list { list-style: none; }
    .player-item {
      font-size: 0.9rem;
      padding: 0.25rem 0;
      color: var(--parch);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .player-item span.dot { width:6px;height:6px;background:#6dbf7a;border-radius:50%; flex-shrink:0; }

    /* Upload de arquivos (apenas mestre) */
    #upload-area { display: none; }
    .upload-btn {
      display: block;
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px dashed var(--smoke);
      border-radius: 3px;
      color: var(--ash);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-align: center;
      margin-bottom: 0.5rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .upload-btn:hover { border-color: var(--gold); color: var(--gold); }
    .file-input { display: none; }
    .file-tag {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: var(--smoke);
      border-radius: 2px;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      color: var(--parch);
      margin: 0.2rem 0.1rem;
    }
    .file-tag button {
      background: none; border: none; color: var(--ash);
      cursor: pointer; font-size: 0.8rem; padding: 0;
    }
    .file-tag button:hover { color: #e05555; }

    /* Status do Grimório */
    #grimorio-status {
      font-size: 0.82rem;
      color: var(--ash);
      font-style: italic;
      margin-bottom: 0.5rem;
    }
    .status-ok { color: #6dbf7a !important; font-style: normal !important; }

    .btn-iniciar {
      width: 100%;
      padding: 0.6rem;
      background: linear-gradient(135deg, var(--gold), #b8892a);
      border: none;
      border-radius: 3px;
      color: var(--stone);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: filter 0.15s;
      margin-top: 0.4rem;
      display: none;
    }
    .btn-iniciar:hover { filter: brightness(1.1); }

    /* Modal ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: var(--stone2);
      border: 1px solid var(--smoke);
      border-radius: 4px;
      padding: 1.8rem;
      max-width: 420px;
      width: 100%;
      position: relative;
    }
    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .modal h2 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }
    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--ash);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .modal input[type=text] {
      width: 100%;
      background: var(--wood);
      border: 1px solid var(--smoke);
      border-radius: 3px;
      padding: 0.6rem 0.8rem;
      color: var(--parch2);
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .modal input:focus { border-color: var(--gold); }
    .modal-btns { display: flex; gap: 0.6rem; }
    .btn-modal-ok {
      flex: 1;
      padding: 0.65rem;
      background: linear-gradient(135deg, var(--ember), #c0450e);
      border: none; border-radius: 3px;
      color: var(--parch2);
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .btn-modal-cancel {
      flex: 1;
      padding: 0.65rem;
      background: transparent;
      border: 1px solid var(--smoke);
      border-radius: 3px;
      color: var(--ash);
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Modal de identificação (fallback) -->
<div class="modal-bg" id="modal-ident">
  <div class="modal">
    <h2>🗝️ Identificação</h2>
    <label>Seu nome / Personagem</label>
    <input type="text" id="modal-nome" placeholder="Ex: Kael, o Errante" maxlength="40" />
    <label>Código da sala</label>
    <input type="text" id="modal-codigo" placeholder="Ex: KXMR7" maxlength="8" style="text-transform:uppercase" />
    <div class="modal-btns">
      <button class="btn-modal-ok" onclick="confirmarIdent()">Entrar</button>
      <button class="btn-modal-cancel" onclick="window.location.href='index.html'">Voltar</button>
    </div>
  </div>
</div>

<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-brand">TavernAI</span>
    <span class="topbar-sala">Sala:</span>
    <span class="topbar-codigo" id="topbar-codigo" title="Clique para copiar" onclick="copiarCodigo()">—</span>
    <span class="topbar-spacer"></span>
    <span id="online-count"><span class="dot-online"></span><span id="n-online">1</span> online</span>
    <button class="btn-config" onclick="window.location.href='index.html'">Sair</button>
  </header>

  <!-- Chat -->
  <main class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input-msg" rows="1" placeholder="Fale como seu personagem…" onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btn-send" onclick="enviarMensagem()">Enviar</button>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Jogadores online -->
    <div class="sidebar-section">
      <div class="sidebar-title">Aventureiros</div>
      <div class="sidebar-body">
        <ul class="player-list" id="player-list">
          <li class="player-item"><span class="dot"></span> —</li>
        </ul>
      </div>
    </div>

    <!-- Upload (só mestre) -->
    <div class="sidebar-section" id="upload-area">
      <div class="sidebar-title">📜 Arquivos da Sessão</div>
      <div class="sidebar-body">
        <p id="grimorio-status">Nenhum arquivo carregado</p>

        <label class="upload-btn" for="file-grimorio">+ Grimório do Mestre</label>
        <input class="file-input" type="file" id="file-grimorio" accept=".html,.pdf,.txt" onchange="carregarArquivo('grimorio', this)" />

        <label class="upload-btn" for="file-fichas">+ Fichas dos Personagens</label>
        <input class="file-input" type="file" id="file-fichas" accept=".html,.pdf,.txt" multiple onchange="carregarArquivo('fichas', this)" />

        <label class="upload-btn" for="file-regras">+ Regras do Sistema</label>
        <input class="file-input" type="file" id="file-regras" accept=".html,.pdf,.txt" onchange="carregarArquivo('regras', this)" />

        <div id="arquivos-tags"></div>
        <button class="btn-iniciar" id="btn-iniciar" onclick="iniciarSessao()">🎲 Iniciar Sessão</button>
      </div>
    </div>

    <!-- Resumo da sessão -->
    <div class="sidebar-section">
      <div class="sidebar-title">📖 Resumo</div>
      <div class="sidebar-body">
        <p style="font-size:0.82rem;color:var(--ash);font-style:italic;" id="resumo-texto">A sessão ainda não começou…</p>
      </div>
    </div>

  </aside>
</div>

<!-- Supabase + PDF.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // ── Config ──
  const SUPA_URL = 'https://jkkpevljkphhxmcqwwud.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impra3Bldmxqa3BoaHhtY3F3d3VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjAwNzgsImV4cCI6MjA5NzkzNjA3OH0.j4rGWiTZxc3PhTX3k_xhlXya5imnubvy4Hye1IrGV4g';
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const CLAUDE_URL = 'https://api.anthropic.com/v1/messages';

  // ── Estado ──
  let SESSION = null;       // { codigo, nome, papel, senha_hash }
  let SALA_ID = null;
  let salaData = null;      // dados da sala (grimorio, regras, fichas)
  let arquivos = { grimorio: '', regras: '', fichas: [] };
  let sessaoIniciada = false;
  let historicoIA = [];     // mensagens para a IA
  let subscription = null;

  // ── Init ──
  window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const codigoURL = params.get('sala')?.toUpperCase();
    const sessaoLocal = localStorage.getItem('tavern_session');

    if (sessaoLocal) {
      SESSION = JSON.parse(sessaoLocal);
      if (codigoURL && SESSION.codigo !== codigoURL) {
        // Código diferente — pedir nova ident
        mostrarModalIdent(codigoURL);
        return;
      }
    } else if (codigoURL) {
      mostrarModalIdent(codigoURL);
      return;
    } else {
      window.location.href = 'index.html';
      return;
    }

    document.getElementById('modal-ident').classList.add('hidden');
    await carregarSala();
  });

  function mostrarModalIdent(codigo) {
    document.getElementById('modal-ident').classList.remove('hidden');
    if (codigo) document.getElementById('modal-codigo').value = codigo;
  }

  async function confirmarIdent() {
    const nome = document.getElementById('modal-nome').value.trim();
    const codigo = document.getElementById('modal-codigo').value.trim().toUpperCase();
    if (!nome || !codigo) return;
    SESSION = { codigo, nome, papel: 'jogador' };
    localStorage.setItem('tavern_session', JSON.stringify(SESSION));
    document.getElementById('modal-ident').classList.add('hidden');
    await carregarSala();
  }

  async function carregarSala() {
    const { data, error } = await sb
      .from('salas')
      .select('*')
      .eq('codigo', SESSION.codigo)
      .single();

    if (error || !data) {
      adicionarMensagem('sistema', 'TavernAI', 'Sala não encontrada. Verifique o código.', null);
      return;
    }

    SALA_ID = data.id;
    salaData = data;
    document.getElementById('topbar-codigo').textContent = SESSION.codigo;

    // Mostrar upload só pro mestre
    if (SESSION.papel === 'mestre') {
      document.getElementById('upload-area').style.display = 'block';
      // Restaurar arquivos salvos
      if (data.grimorio_texto) { arquivos.grimorio = data.grimorio_texto; marcarArquivo('grimorio', 'Grimório'); }
      if (data.regras_texto) { arquivos.regras = data.regras_texto; marcarArquivo('regras', 'Regras'); }
      if (data.fichas_json && data.fichas_json !== '[]') {
        arquivos.fichas = JSON.parse(data.fichas_json);
        arquivos.fichas.forEach((_, i) => marcarArquivo('fichas', `Ficha ${i+1}`));
      }
      verificarBotaoIniciar();

      // Sessão já foi iniciada antes?
      if (data.sessao_iniciada) { sessaoIniciada = true; }
    }

    // Carregar mensagens anteriores
    const { data: msgs } = await sb
      .from('mensagens')
      .select('*')
      .eq('sala_id', SALA_ID)
      .order('criado_em', { ascending: true })
      .limit(100);

    if (msgs) {
      msgs.forEach(m => adicionarMensagem(m.papel, m.autor, m.conteudo, m.criado_em, false));
      // Reconstruir histórico IA
      historicoIA = msgs
        .filter(m => m.papel !== 'sistema')
        .map(m => ({
          role: m.papel === 'mestre' ? 'assistant' : 'user',
          content: `[${m.autor}]: ${m.conteudo}`
        }));
      scrollBottom();
    }

    // Mensagem de boas-vindas se sala vazia
    if (!msgs || msgs.length === 0) {
      adicionarMensagem('sistema', 'TavernAI',
        SESSION.papel === 'mestre'
          ? `Bem-vindo, ${SESSION.nome}. Carregue os arquivos e inicie a sessão.`
          : `Você entrou na taverna como ${SESSION.nome}. Aguarde o Mestre iniciar a sessão.`,
        null, false);
    }

    inscreverRealtime();
    atualizarJogadores();
  }

  // ── Realtime ──
  function inscreverRealtime() {
    subscription = sb
      .channel(`sala-${SALA_ID}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'mensagens',
        filter: `sala_id=eq.${SALA_ID}`
      }, payload => {
        const m = payload.new;
        // Evitar duplicar msg própria (já renderizada otimisticamente)
        if (m.papel === 'jogador' && m.autor === SESSION.nome) return;
        adicionarMensagem(m.papel, m.autor, m.conteudo, m.criado_em);
        if (m.papel !== 'sistema') {
          historicoIA.push({
            role: m.papel === 'mestre' ? 'assistant' : 'user',
            content: `[${m.autor}]: ${m.conteudo}`
          });
        }
      })
      .subscribe();
  }

  // ── Upload de arquivos ──
  async function carregarArquivo(tipo, input) {
    const files = Array.from(input.files);
    if (!files.length) return;

    for (const file of files) {
      let texto = '';
      if (file.type === 'application/pdf') {
        texto = await extrairTextoPDF(file);
      } else {
        texto = await file.text();
        // Se for HTML, pegar só o texto
        if (file.name.endsWith('.html')) {
          const tmp = document.createElement('div');
          tmp.innerHTML = texto;
          texto = tmp.innerText;
        }
      }

      if (tipo === 'grimorio') {
        arquivos.grimorio = texto;
        marcarArquivo('grimorio', file.name);
      } else if (tipo === 'regras') {
        arquivos.regras = texto;
        marcarArquivo('regras', file.name);
      } else if (tipo === 'fichas') {
        arquivos.fichas.push(texto);
        marcarArquivo('fichas', file.name);
      }
    }

    // Salvar no Supabase
    await sb.from('salas').update({
      grimorio_texto: arquivos.grimorio,
      regras_texto: arquivos.regras,
      fichas_json: JSON.stringify(arquivos.fichas)
    }).eq('id', SALA_ID);

    verificarBotaoIniciar();
  }

  async function extrairTextoPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let texto = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      texto += content.items.map(item => item.str).join(' ') + '\n';
    }
    return texto;
  }

  function marcarArquivo(tipo, nome) {
    const container = document.getElementById('arquivos-tags');
    const id = `tag-${tipo}-${nome.replace(/\W/g,'_')}`;
    if (document.getElementById(id)) return;
    const tag = document.createElement('span');
    tag.className = 'file-tag';
    tag.id = id;
    const icones = { grimorio: '📖', regras: '⚔️', fichas: '🧙' };
    tag.innerHTML = `${icones[tipo] || '📄'} ${nome.substring(0,20)} <button onclick="this.parentElement.remove()" title="Remover">×</button>`;
    container.appendChild(tag);
    document.getElementById('grimorio-status').textContent = 'Arquivos carregados';
    document.getElementById('grimorio-status').className = 'status-ok';
  }

  function verificarBotaoIniciar() {
    const btn = document.getElementById('btn-iniciar');
    btn.style.display = arquivos.grimorio ? 'block' : 'none';
  }

  // ── Iniciar sessão ──
  async function iniciarSessao() {
    if (sessaoIniciada) return;
    sessaoIniciada = true;
    document.getElementById('btn-iniciar').disabled = true;
    document.getElementById('btn-iniciar').textContent = '⏳ Convocando o Mestre…';

    await sb.from('salas').update({ sessao_iniciada: true }).eq('id', SALA_ID);

    // Pedir à IA para abrir a sessão
    const abertura = await chamarIA('[Sistema]: A sessão começa agora. Apresente-se como o Mestre e faça uma abertura narrativa épica da sessão, apresentando o mundo e convidando os jogadores a agir. Seja conciso (3-4 parágrafos).');

    if (abertura) {
      await salvarEExibirMensagem('mestre', '🎲 Mestre', abertura);
    }

    document.getElementById('btn-iniciar').textContent = '✅ Sessão em curso';
    document.getElementById('resumo-texto').textContent = 'Sessão iniciada. O Mestre aguarda os aventureiros.';
  }

  // ── Enviar mensagem ──
  async function enviarMensagem() {
    const input = document.getElementById('input-msg');
    const texto = input.value.trim();
    if (!texto || !SALA_ID) return;

    const btnSend = document.getElementById('btn-send');
    btnSend.disabled = true;
    input.value = '';
    autoResize(input);

    // Renderizar otimisticamente
    adicionarMensagem('jogador', SESSION.nome, texto, new Date().toISOString());
    await salvarMensagem('jogador', SESSION.nome, texto);

    historicoIA.push({ role: 'user', content: `[${SESSION.nome}]: ${texto}` });

    // IA responde
    mostrarTyping();
    const resposta = await chamarIA(`[${SESSION.nome}]: ${texto}`);
    removerTyping();

    if (resposta) {
      await salvarEExibirMensagem('mestre', '🎲 Mestre', resposta);
      historicoIA.push({ role: 'assistant', content: resposta });
    }

    btnSend.disabled = false;
  }

  // ── Salvar mensagem no Supabase ──
  async function salvarMensagem(papel, autor, conteudo) {
    await sb.from('mensagens').insert({ sala_id: SALA_ID, papel, autor, conteudo });
  }

  async function salvarEExibirMensagem(papel, autor, conteudo) {
    await salvarMensagem(papel, autor, conteudo);
    adicionarMensagem(papel, autor, conteudo, new Date().toISOString());
  }

  // ── Chamar API Claude ──
  async function chamarIA(msgUsuario) {
    const systemPrompt = construirSystemPrompt();
    const msgs = [...historicoIA.slice(-30)]; // últimas 30 mensagens para contexto

    try {
      const res = await fetch(CLAUDE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: msgs.length > 0 ? msgs : [{ role: 'user', content: msgUsuario }]
        })
      });
      const data = await res.json();
      if (data.content && data.content[0]) return data.content[0].text;
      return null;
    } catch (e) {
      console.error('Erro IA:', e);
      return '*(O Mestre hesita por um momento… tente novamente.)*';
    }
  }

  function construirSystemPrompt() {
    let prompt = `Você é o Mestre de uma sessão de RPG de mesa. Você DEVE manter-se fiel ao mundo, tom e regras fornecidos pelo Grimório. Nunca saia do personagem. Nunca quebre a narrativa. Responda sempre em português (pt-BR).

REGRAS DE COMPORTAMENTO:
- Você é o narrador e árbitro do mundo. Descreva cenários, NPCs, consequências das ações.
- Mantenha suspense, tensão dramática e coerência com o lore.
- Não resolva automaticamente as ações dos jogadores — descreva o resultado de acordo com as regras.
- Nunca invente informações que contradigam o Grimório.
- Respostas entre 1-4 parágrafos, dependendo da situação.
- Use linguagem imersiva e literária.
`;

    if (arquivos.grimorio) {
      prompt += `\n\n═══ GRIMÓRIO DO MESTRE ═══\n${arquivos.grimorio.substring(0, 8000)}`;
    }
    if (arquivos.regras) {
      prompt += `\n\n═══ REGRAS DO SISTEMA ═══\n${arquivos.regras.substring(0, 3000)}`;
    }
    if (arquivos.fichas.length > 0) {
      prompt += `\n\n═══ FICHAS DOS PERSONAGENS ═══\n`;
      arquivos.fichas.forEach((f, i) => {
        prompt += `\n--- Personagem ${i+1} ---\n${f.substring(0, 2000)}`;
      });
    }

    // Recuperar do Supabase se mestre não tiver arquivos carregados localmente
    if (!arquivos.grimorio && salaData?.grimorio_texto) {
      arquivos.grimorio = salaData.grimorio_texto;
      arquivos.regras = salaData.regras_texto || '';
      try { arquivos.fichas = JSON.parse(salaData.fichas_json || '[]'); } catch(e) {}
    }

    return prompt;
  }

  // ── UI helpers ──
  function adicionarMensagem(papel, autor, conteudo, timestamp, scroll = true) {
    const el = document.createElement('div');
    el.className = `msg-item ${papel}`;
    const hora = timestamp ? new Date(timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '';
    el.innerHTML = `
      <div class="msg-meta">${autor}${hora ? ' · ' + hora : ''}</div>
      <div class="msg-bubble">${escHtml(conteudo)}</div>
    `;
    document.getElementById('messages').appendChild(el);
    if (scroll) scrollBottom();
  }

  let typingEl = null;
  function mostrarTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'msg-item mestre typing-indicator';
    typingEl.id = 'typing';
    typingEl.innerHTML = `
      <div class="msg-meta">🎲 Mestre</div>
      <div class="msg-bubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    document.getElementById('messages').appendChild(typingEl);
    scrollBottom();
  }

  function removerTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function onKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviarMensagem();
    }
  }

  function copiarCodigo() {
    const codigo = SESSION?.codigo || '';
    navigator.clipboard.writeText(codigo).then(() => {
      const el = document.getElementById('topbar-codigo');
      const orig = el.textContent;
      el.textContent = 'Copiado!';
      setTimeout(() => { el.textContent = orig; }, 1500);
    });
  }

  async function atualizarJogadores() {
    // Buscar nomes únicos das mensagens da sala
    const { data } = await sb
      .from('mensagens')
      .select('autor, papel')
      .eq('sala_id', SALA_ID)
      .neq('papel', 'sistema')
      .neq('papel', 'mestre');

    const nomes = [...new Set((data || []).map(m => m.autor))];
    if (SESSION.nome) nomes.unshift(SESSION.nome);
    const uniqueNomes = [...new Set(nomes)];

    const list = document.getElementById('player-list');
    list.innerHTML = uniqueNomes.slice(0, 8).map(n =>
      `<li class="player-item"><span class="dot"></span> ${escHtml(n)}</li>`
    ).join('');

    document.getElementById('n-online').textContent = uniqueNomes.length;
  }
</script>
